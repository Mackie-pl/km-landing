name: Deploy landing page (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Disable Jekyll so files are served verbatim.
      - run: touch .nojekyll

      # Pin the apex/root custom domain when ROOT_DOMAIN repo variable is set
      # (e.g. example.com). Without it, the default *.github.io URL is used.
      - name: Write CNAME
        if: vars.ROOT_DOMAIN != ''
        run: echo "${{ vars.ROOT_DOMAIN }}" > CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
